linux|darwin:
  # Bash shell configuration
  links:
    # We don't directly link .bashrc - we create a stub that sources it

  installs:
    depends:
      - tools
    cmd: |
      # Install Bash and bash-completion
      brew install --quiet bash bash-completion

      export DOTFILES_DIR="{{ config.dotfiles }}"
      {{ config.dotfiles }}/shells/bash/install.bash
