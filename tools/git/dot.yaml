global:
  links:
    .gitconfig: ~/.gitconfig
    .gitignore_global: ~/.gitignore_global

darwin:
  installs:
    depends:
      - git/git-op-setup
    cmd: |
      brew install --quiet git gh

      brew install --quiet --cask 1password-cli

linux:
  installs:
    depends:
      - git/git-op-setup
    cmd: |
      sudo apt-get update && sudo apt-get install -y git gh 1password-cli
