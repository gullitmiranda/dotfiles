linux|darwin:
  installs:
    cmd: |
      export DOTFILES_DIR="{{ config.dotfiles }}"

      # Make sure shared directories exists
      mkdir -p "$DOTFILES_DIR/local/"

      echo "Created $DOTFILES_DIR/local/editor.env.sh with editor order preference"
      bash -c '$DOTFILES_DIR/bin/create_shell_stub "$DOTFILES_DIR/local/editor.env.sh" << "EOL"
      # Set up editor preferences based on availability
      # Get editor options from config or set defaults
      export __dotfiles_editor_opts="{{ config.variables.shell.EDITOR }}"
      export __dotfiles_visual_opts="{{ config.variables.shell.VISUAL }}"
      EOL'

      echo "Common shell utilities and configuration files have been created."
