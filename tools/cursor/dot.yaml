darwin:
  installs:
    cmd: |
      # Install Cursor if not present
      if ! command -v cursor >/dev/null 2>&1; then
        brew install --cask --quiet cursor
      fi

      # yq is needed for YAML processing in cursor-profile
      if ! command -v yq >/dev/null 2>&1; then
        brew install --quiet yq
      fi

      # Pillow is needed for icon badge generation
      python3 -m pip install --quiet Pillow 2>/dev/null || true

      CURSOR_DIR="{{ config.dotfiles }}/tools/cursor"

      # Make scripts executable
      chmod +x "${CURSOR_DIR}/bin/cursor-setup"
      chmod +x "${CURSOR_DIR}/bin/cursor-profile"

      # Run setup (creates .app bundles, symlinks config, generates per-profile launchers)
      "${CURSOR_DIR}/bin/cursor-setup"

  links:
    # Per-profile launchers (e.g. cursor-work, cursor-personal) are generated
    # dynamically by cursor-profile setup — not linked from dotfiles.
    bin/cursor-setup: ~/.local/bin/cursor-setup
    bin/cursor-profile: ~/.local/bin/cursor-profile
