global:
  links:
    .gitconfig: ~/.gitconfig
    .gitignore_global: ~/.gitignore_global

darwin:
  installs:
    depends:
      - git/git-op-setup
      - git/git-mise-setup
    cmd: |
      brew install --quiet git gh jq

linux:
  installs:
    depends:
      - git/git-op-setup
      - git/git-mise-setup
    cmd: |
      sudo apt-get update && sudo apt-get install -y git gh jq
