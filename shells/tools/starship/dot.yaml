linux|darwin:
  # Starship prompt configuration
  links:
    starship.toml: ~/.config/starship.toml

  installs:
    cmd: |
      # Install Starship prompt
      brew install --quiet starship

      # Install recommended fonts for best experience
      brew install --quiet --cask \
        font-fira-code \
        font-fira-code-nerd-font \
        font-fira-mono \
        font-fira-mono-for-powerline \
        font-fira-mono-nerd-font \
        font-jetbrains-mono-nerd-font

      echo "Starship setup completed."

      # Display Starship usage instructions
      echo "Starship is installed. Here's how to use it:"
      echo "- Edit your configuration in $DOTFILES_DIR/shells/starship/starship.toml"
      echo "- For documentation, visit: https://starship.rs/config/"
      echo "- To preview changes: starship explain"
      echo "- To see all module options: starship config"
