linux|darwin:
  links:
    ripgrep/.ripgreprc: "~/.ripgreprc"

  # Installation commands for common shell utilities
  installs:
    cmd: |
      # Install common utilities that all shells can use
      brew install --quiet coreutils wget curl jq fzf bat fd ripgrep eza

      # Make sure shared directories exists
      mkdir -p "~/.local/.dotfiles/"

      echo "Created ~/.local/.dotfiles/editor.env.sh with editor order preference"
      bash -c '$DOTFILES_DIR/bin/create_shell_stub "~/.local/.dotfiles/editor.env.sh" << "EOL"
      # Set up editor preferences based on availability
      # Get editor options from config or set defaults
      export __dotfiles_editor_opts="{{ config.variables.shell.EDITOR }}"
      export __dotfiles_visual_opts="{{ config.variables.shell.VISUAL }}"
      EOL'

      echo "Common shell utilities and configuration files have been created."
