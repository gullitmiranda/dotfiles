name: Trunk Advisory Check

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 9:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Scan for advisories
        id: scan
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          # ── Tool registry ──────────────────────────────────
          # name|osv_ecosystem|osv_package|gh_advisory_ecosystem
          # Leave fields empty when no package registry presence.
          TOOLS=(
            "checkov|PyPI|checkov|pip"
            "markdownlint|npm|markdownlint-cli|npm"
            "prettier|npm|prettier|npm"
            "shfmt|Go|mvdan.cc/sh|go"
            "taplo|crates.io|taplo|rust"
            "trufflehog|Go|github.com/trufflesecurity/trufflehog|go"
            "yamllint|PyPI|yamllint|pip"
            "trivy|Go|github.com/aquasecurity/trivy|go"
          )

          SC_RE="malware|supply.chain|backdoor|compromis|malicious|credential.steal|exfiltrat|trojan"

          declare -A SEEN
          body=""
          count=0

          for entry in "${TOOLS[@]}"; do
            IFS='|' read -r name osv_eco osv_pkg gh_eco <<< "$entry"
            hits=""

            # ── OSV.dev: flag supply-chain keyword matches ──
            if [[ -n "$osv_eco" ]]; then
              osv=$(curl -sf --max-time 15 -X POST "https://api.osv.dev/v1/query" \
                -H "Content-Type: application/json" \
                -d "{\"package\":{\"name\":\"$osv_pkg\",\"ecosystem\":\"$osv_eco\"}}" || true)

              if [[ -n "$osv" ]]; then
                while IFS=$'\t' read -r id summary; do
                  [[ -z "$id" || -n "${SEEN[$id]:-}" ]] && continue
                  if echo "$summary" | grep -qiE "$SC_RE"; then
                    SEEN[$id]=1
                    hits="${hits}- ⚠️ **SUPPLY-CHAIN** \`${id}\`: ${summary}\n"
                    count=$((count + 1))
                  fi
                done < <(echo "$osv" | jq -r '.vulns[]? | [.id, .summary] | @tsv' 2>/dev/null)
              fi
            fi

            # ── GitHub Advisory DB: critical + malware ──
            if [[ -n "$gh_eco" && -n "$osv_pkg" ]]; then
              gh_json=$(gh api "/advisories" \
                -f ecosystem="$gh_eco" \
                -f affects="$osv_pkg" \
                -f per_page=100 2>/dev/null || true)

              if [[ -n "$gh_json" ]]; then
                while IFS=$'\t' read -r gid gsummary gsev gtyp; do
                  [[ -z "$gid" || -n "${SEEN[$gid]:-}" ]] && continue
                  keep=false
                  tag=""
                  [[ "$gtyp" == "malware" ]] && { keep=true; tag="⚠️ MALWARE"; }
                  [[ "$gsev" == "critical" ]] && { keep=true; tag="${tag:+$tag / }CRITICAL"; }
                  $keep || continue
                  SEEN[$gid]=1
                  hits="${hits}- **${tag}** \`${gid}\` (${gsev}): ${gsummary}\n"
                  count=$((count + 1))
                done < <(echo "$gh_json" | jq -r '.[]? | [.ghsa_id, .summary, .severity, .type] | @tsv' 2>/dev/null)
              fi
            fi

            [[ -n "$hits" ]] && body="${body}### ${name}\n\n${hits}\n"
          done

          echo "count=$count" >> "$GITHUB_OUTPUT"

          if [[ $count -gt 0 ]]; then
            {
              echo "## Trunk Advisory Check — $(date -u +%Y-%m-%d)"
              echo ""
              echo "Found **${count}** critical / supply-chain advisory(ies) affecting trunk tools."
              echo ""
              echo -e "$body"
              echo "---"
              echo "*Auto-generated by \`trunk-advisory-check\` workflow. Close after reviewing.*"
            } > /tmp/issue_body.md
          fi

      - name: Ensure security label exists
        if: steps.scan.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create security \
            --repo "$GITHUB_REPOSITORY" \
            --description "Security advisories and supply-chain alerts" \
            --color "B60205" 2>/dev/null || true

      - name: Open or update issue
        if: steps.scan.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --label "security" \
            --state open \
            --search "Trunk Advisory Check" \
            --json number --jq '.[0].number' 2>/dev/null || true)

          if [[ -n "$existing" && "$existing" != "null" ]]; then
            gh issue comment "$existing" \
              --repo "$GITHUB_REPOSITORY" \
              --body-file /tmp/issue_body.md
          else
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "Trunk Advisory Check — $(date -u +%Y-%m-%d)" \
              --body-file /tmp/issue_body.md \
              --label "security"
          fi
